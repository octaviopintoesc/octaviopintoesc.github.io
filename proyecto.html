<!--
  PLANTILLA DE PROYECTO INDIVIDUAL
  ---------------------------------
  Esta única página sirve para TODOS los proyectos. El contenido se arma
  con JavaScript según el ?id= que llega en la URL (por ejemplo
  proyecto.html?id=lumens-brawn), leyendo del objeto PROJECTS más abajo
  en el <script> al final del archivo.

  CÓMO AGREGAR O EDITAR UN PROYECTO:
  1. Buscá el objeto PROJECTS en el <script>.
  2. Cada proyecto tiene: title, tag (categoría), desc (texto corto),
     cover (la foto que ya se usa como link en el portfolio de index.html —
     ojo: esa foto NUNCA se vuelve a mostrar acá adentro, se excluye sola)
     y gallery (arreglo de fotos/videos propios de esta página).
  3. Para sumar más fotos a un proyecto, agregá más URLs al arreglo
     gallery — no hay límite, el layout las acomoda solo (tipo revista,
     columnas de distinto alto).
  4. Para sumar un video, agregalo como objeto en vez de string, y ponelo
     primero en el arreglo para que aparezca arriba de todo:
       { type:"video", src:"URL del video .mp4" }
     El video arranca en silencio (autoplay) con un botón para activar el
     audio con un clic — así lo pide el navegador.
  5. Si querés que las fotos de un proyecto ocupen todo el ancho de la
     pantalla (sin columnas ni tarjetas), agregá layout:"full" a ese
     proyecto. Sin ese campo, el default es la galería tipo revista.
  6. Para agregar un proyecto nuevo: copiá un bloque del objeto, cambiá
     la key (el id) y sumá esa key al arreglo ORDER (define el orden
     cronológico y la navegación "proyecto anterior / siguiente").
  7. Recordá agregar también la tarjeta correspondiente en el portfolio
     de index.html, con el mismo id.

  CÓMO PERSONALIZAR EL RESTO:
  [WHATSAPP] -> tu número en formato 549XXXXXXXXXX (sin + ni espacios)
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --paper:      #FFFFFF;
    --paper-alt:  #F6F5F1;
    --ink:        #15140F;
    --ink-soft:   #726F65;
    --ink-faint:  #A6A296;
    --accent:     #3E4C59;
    --line:       #E3DFD3;
    --radius:     20px;
    --font-display:'Hanken Grotesk', sans-serif;
    --font-body:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:  'IBM Plex Mono', monospace;
    --ease: cubic-bezier(.22,.61,.36,1);

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; font-size:16px; -webkit-font-smoothing:antialiased;}
  img{max-width:100%; display:block; width:100%; height:100%; object-fit:cover;}
  a{color:inherit; text-decoration:none;}
  ::selection{background:var(--ink); color:var(--paper);}
  a:focus-visible, button:focus-visible{outline:2px solid var(--accent); outline-offset:3px;}

  .dim{display:inline-flex; align-items:center; gap:10px; margin-bottom:22px;}
  .dim i{position:relative; width:26px; height:1px; background:var(--ink-faint); flex-shrink:0; display:block;}
  .dim i::before, .dim i::after{content:''; position:absolute; width:1px; height:6px; background:var(--ink-faint); top:-3px;}
  .dim i::before{left:0;} .dim i::after{right:0;}
  .dim span{font-family:var(--font-mono); font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);}

  .reveal{opacity:0; transform:translateY(22px); transition:opacity .9s var(--ease), transform .9s var(--ease);}
  .reveal.in{opacity:1; transform:translateY(0);}
  @media (prefers-reduced-motion:reduce){ .reveal{opacity:1; transform:none; transition:none;} *{scroll-behavior:auto !important;} }

  /* ---------- nav (idéntico a index.html) ---------- */

  nav.wrap{display:flex; align-items:center; justify-content:space-between; height:84px;}
  .logo{display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:600; font-size:.82rem; letter-spacing:.02em; height:44px; padding:0 15px; border-radius:999px; border:1.5px solid var(--ink); background:var(--ink); color:var(--paper); transition:transform .25s var(--ease), box-shadow .25s var(--ease);}
  .logo:hover{transform:translateY(-1px); box-shadow:0 6px 16px rgba(21,20,15,.18);}
  .logo:active{transform:translateY(0); box-shadow:none;}
  .logo b{font-weight:600; color:var(--paper); opacity:.5;}
  .nav-links{display:flex; align-items:center; gap:38px; font-size:.86rem;}
  .nav-links a{position:relative; padding:6px 0; color:var(--ink-soft); transition:color .25s;}
  .nav-links a::after{content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--ink); transition:width .3s var(--ease);}
  .nav-links a:hover{color:var(--ink);}
  .nav-links a:hover::after{width:100%;}
  .nav-cta{display:flex; align-items:center; gap:8px; font-size:.86rem; font-weight:500;}
  .nav-cta .arrow{transition:transform .3s var(--ease);}
  .nav-cta:hover .arrow{transform:translateX(4px);}
  .burger{display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:6px;}
  .burger span{width:22px; height:1px; background:var(--ink);}

  /* ---------- encabezado del proyecto ---------- */
  .proj-head{padding:150px 0 0;}
  .back-link{display:inline-flex; align-items:center; gap:8px; font-size:.86rem; color:var(--ink-soft); transition:color .25s, gap .25s;}
  .back-link:hover{color:var(--ink); gap:12px;}
  .proj-title-row{display:flex; justify-content:space-between; align-items:flex-end; gap:40px; flex-wrap:wrap; margin-top:26px;}
  h1.proj-title{font-family:var(--font-display); font-weight:600; font-size:clamp(2.4rem,5vw,4rem); letter-spacing:-.02em; line-height:1.02; max-width:760px;}
  .proj-desc{max-width:420px; color:var(--ink-soft); font-size:1.02rem; padding-bottom:6px;}

  /* ---------- ficha técnica ---------- */
  .proj-specs{display:flex; flex-wrap:wrap; margin-top:44px; padding-top:26px; border-top:1px solid var(--line);}
  .proj-specs.hidden{display:none;}
  .spec-item{padding-right:32px; margin-right:32px; margin-bottom:16px; border-right:1px solid var(--line);}
  .spec-item:last-child{border-right:none; margin-right:0; padding-right:0;}
  .spec-item .k{display:block; font-family:var(--font-mono); font-size:.66rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px;}
  .spec-item .v{font-family:var(--font-display); font-weight:500; font-size:.98rem; max-width:260px;}
  .spec-links{display:flex; flex-direction:column; gap:6px;}
  .spec-links a{color:var(--ink); border-bottom:1px solid var(--line); padding-bottom:1px; width:fit-content; transition:border-color .2s, color .2s;}
  .spec-links a:hover{border-color:var(--ink); color:var(--accent);}

  /* ---------- galería: masonry por columnas (default) o ancho completo (full-bleed) ---------- */
  .proj-gallery{padding:54px 0 130px;}
  .gal-grid{max-width:1240px; margin:0 auto; padding:0 40px; column-count:2; column-gap:20px;}
  .gal-item{display:block; break-inside:avoid; margin-bottom:20px; border-radius:var(--radius); overflow:hidden; background:var(--paper-alt); border:1px solid rgba(21,20,15,.07); box-shadow:0 1px 2px rgba(21,20,15,.04); position:relative;}
  .gal-item img, .gal-item video{width:100%; height:auto; display:block; transition:transform .8s var(--ease);}
  .gal-item:hover img, .gal-item:hover video{transform:scale(1.03);}

  /* ancho completo: cada foto ocupa todo el ancho de la pantalla, sin las tarjetas ni los márgenes del sitio */
  .gal-item.wide{column-span:all;}
  .gal-item.centered{column-span:all; max-width:640px; margin-left:auto; margin-right:auto;}

  .gal-grid.gal-full{max-width:none; padding:0; column-count:1; display:flex; flex-direction:column; gap:10px;}
  .gal-full .gal-item{margin-bottom:0; border-radius:0; border:none; box-shadow:none; break-inside:auto;}
  .gal-full .gal-item:hover img, .gal-full .gal-item:hover video{transform:none;}

  /* botón de audio sobre el video */
  .gal-video-wrap{position:relative;}
  .vid-audio-btn{position:absolute; bottom:18px; right:18px; width:44px; height:44px; border-radius:50%; background:rgba(21,20,15,.55); backdrop-filter:blur(6px); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .25s; z-index:2;}
  .vid-audio-btn:hover{background:rgba(21,20,15,.78);}
  .vid-audio-btn svg{width:19px; height:19px;}

  /* estado vacío: cuando la única foto del proyecto era la del portfolio y ya se excluyó */
  .gal-empty{padding:60px 0; text-align:center; color:var(--ink-faint); font-family:var(--font-mono); font-size:.82rem; letter-spacing:.02em;}

  /* ---------- navegación entre proyectos ---------- */
  .proj-nav{padding:60px 0 120px; border-top:1px solid var(--line);}
  .proj-nav-row{display:flex; justify-content:space-between; align-items:center; gap:24px; flex-wrap:wrap;}
  .proj-nav-link{font-size:.92rem; color:var(--ink-soft); display:flex; align-items:center; gap:10px; transition:color .25s;}
  .proj-nav-link:hover{color:var(--ink);}
  .proj-nav-link .lbl{font-family:var(--font-display); font-weight:600; font-size:1.15rem; color:var(--ink);}
  .proj-nav-back{font-family:var(--font-mono); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); border:1px solid var(--line); border-radius:100px; padding:10px 20px; transition:border-color .25s, color .25s;}

  /* ---------- contacto (idéntico a index.html) ---------- */

  .contact-links a{display:inline-flex; align-items:center; justify-content:center; width:54px; height:54px; border-radius:50%; border:1px solid rgba(255,255,255,.3); transition:border-color .25s, background .25s, transform .25s;}

  .contact-links svg{width:21px; height:21px;}

  /* ---------- footer (idéntico a index.html) ---------- */
  footer{padding:30px 0; background:var(--ink); color:rgba(250,248,243,.5);}
  .foot-row{display:flex; justify-content:space-between; align-items:center; font-family:var(--font-mono); font-size:.72rem; flex-wrap:wrap; gap:10px;}

  @media (max-width:760px){
    .wrap{padding:0 24px;}
    .nav-links{display:none;}
    .burger{display:flex;}
    .proj-head{padding-top:120px;}
    .gal-grid{column-count:1;}
  }
</style>

  /* Define el orden cronológico — se usa para "proyecto anterior / siguiente" */
  const ORDER = [
    "lumens-brawn","dapquim","atina-tools","miken","oregon-hotel",
    "orbital","lampara-larga","fusion-a-medida","cajas-hoplita",
    "almacen-deportivo","tablero-migia"
  ];

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const project = PROJECTS[id];

  function labelForUrl(url) {
    try {
      const host = new URL(url).hostname.replace('www.', '');
      if (host.includes('instagram.com')) return 'Instagram';
      if (host.includes('linkedin.com')) return 'LinkedIn';
      if (host.includes('facebook.com')) return 'Facebook';
      if (host.includes('tiktok.com')) return 'TikTok';
      return host;
    } catch (e) { return 'Link'; }
  }

  function renderSpecs(specs) {
    const el = document.getElementById('projSpecs');
    if (!specs) { el.classList.add('hidden'); el.innerHTML = ''; return; }
    const order = [['year','Año'], ['tools','Herramientas'], ['client','Cliente'], ['role','Trabajo']];
    const rows = order.filter(([k]) => specs[k]);
    const hasLinks = Array.isArray(specs.links) && specs.links.length > 0;
    if (!rows.length && !hasLinks) { el.classList.add('hidden'); el.innerHTML = ''; return; }
    el.classList.remove('hidden');
    let html = rows.map(([k, label]) => `
      <div class="spec-item"><span class="k">${label}</span><span class="v">${specs[k]}</span></div>
    `).join('');
    if (hasLinks) {
      html += `<div class="spec-item"><span class="k">Links</span><span class="v spec-links">${
        specs.links.map(url => `<a href="${url}" target="_blank" rel="noopener">${labelForUrl(url)} ↗</a>`).join('')
      }</span></div>`;
    }
    el.innerHTML = html;
  }

  const ICON_MUTED = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="#fff"/><line x1="16" y1="9" x2="22" y2="15" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><line x1="22" y1="9" x2="16" y2="15" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>';
  const ICON_UNMUTED = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="#fff"/><path d="M16.5 8.5a5 5 0 010 7" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><path d="M19 6a9 9 0 010 12" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>';

  if (project) {
    document.title = project.title + " — Octavio Pinto";
    document.getElementById('projTag').textContent = project.tag;
    document.getElementById('projTitle').textContent = project.title;
    document.getElementById('projDesc').textContent = project.desc;
    renderSpecs(project.specs);

    const galGrid = document.getElementById('galGrid');
    if (project.layout === 'full') galGrid.classList.add('gal-full');

    // la foto que ya funciona como link en el portfolio (project.cover) nunca se repite acá adentro
    const galleryItems = project.gallery.filter(item => {
      const src = (typeof item === 'object') ? item.src : item;
      return src !== project.cover;
    });

    if (!galleryItems.length) {
      galGrid.innerHTML = '<p class="gal-empty">Todavía no hay fotos propias cargadas para este proyecto.</p>';
    }

    galleryItems.forEach(item => {
      // cada item puede ser: un string (imagen normal), o un objeto:
      //   { src:"..." }                          -> imagen normal
      //   { src:"...", wide:true }                -> imagen "de lado a lado" (ocupa las dos columnas, respeta los márgenes de la página)
      //   { src:"...", centered:true }            -> imagen chica centrada, sola en su fila
      //   { type:"video", src:"..." }              -> video normal
      //   { type:"video", src:"...", wide:true }   -> video "de lado a lado"
      //   { type:"video", src:"...", centered:true } -> video chico centrado, solo en su fila
      const isObj = typeof item === 'object';
      const isVideo = isObj && item.type === 'video';
      const isWide = isObj && item.wide === true;
      const isCentered = isObj && item.centered === true;
      const src = isObj ? item.src : item;

      const fig = document.createElement(isVideo ? 'div' : 'a');
      fig.className = 'gal-item reveal' + (isVideo ? ' gal-video-wrap' : '') + (isWide ? ' wide' : '') + (isCentered ? ' centered' : '');
      if (!isVideo) { fig.href = src; fig.target = '_blank'; }

      const media = document.createElement(isVideo ? 'video' : 'img');
      media.src = src;
      if (isVideo) {
        media.autoplay = true;
        media.muted = true;
        media.loop = true;
        media.playsInline = true;
      } else {
        media.alt = project.title;
        media.loading = 'lazy';
      }
      fig.appendChild(media);

      if (isVideo) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'vid-audio-btn';
        btn.setAttribute('aria-label', 'Activar audio');
        btn.innerHTML = ICON_MUTED;
        btn.addEventListener('click', () => {
          media.muted = !media.muted;
          if (!media.muted) { media.play(); }
          btn.innerHTML = media.muted ? ICON_MUTED : ICON_UNMUTED;
          btn.setAttribute('aria-label', media.muted ? 'Activar audio' : 'Silenciar');
        });
        fig.appendChild(btn);
      }

      galGrid.appendChild(fig);
    });

    const idx = ORDER.indexOf(id);
    const prevId = ORDER[(idx - 1 + ORDER.length) % ORDER.length];
    const nextId = ORDER[(idx + 1) % ORDER.length];
    const prevEl = document.getElementById('prevProj');
    const nextEl = document.getElementById('nextProj');
    prevEl.href = 'proyecto.html?id=' + prevId;
    nextEl.href = 'proyecto.html?id=' + nextId;
    document.getElementById('prevLbl').textContent = PROJECTS[prevId].title;
    document.getElementById('nextLbl').textContent = PROJECTS[nextId].title;
  } else {
    document.getElementById('projTag').textContent = 'Proyecto no encontrado';
    document.getElementById('projTitle').textContent = 'Volvé al portfolio para elegir un proyecto';
    document.getElementById('projDesc').textContent = '';
    document.getElementById('projSpecs').classList.add('hidden');
    document.querySelector('.proj-gallery').style.display = 'none';
    document.querySelector('.proj-nav').style.display = 'none';
  }

  // mobile menu
  const burger = document.getElementById('burgerBtn');
  const navLinks = document.getElementById('navLinks');
  burger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    burger.setAttribute('aria-expanded', open);
  });

  // scroll reveal
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!prefersReduced && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, {threshold:.1, rootMargin:'0px 0px -60px 0px'});
    // los elementos de la galería se agregan async, hay que observarlos después de crearlos
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  } else {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  }
