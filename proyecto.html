<!--
  ════════════════════════════════════════════════════
  CÓMO AGREGAR O EDITAR PROYECTOS
  ════════════════════════════════════════════════════
  1. Buscá el array PROJECTS más abajo en el <script>
  2. Copiá uno de los objetos {} y modificalo
  3. El campo "id" debe coincidir exactamente con el
     data-id de la card en landing-page.html
  4. En "gallery": cada elemento es la URL de una imagen.
     Si aún no tenés foto, dejá "" y se muestra placeholder.
  ════════════════════════════════════════════════════
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --paper:#EEECE2;
    --paper-alt:#E3E0D1;
    --ink:#181816;
    --ink-soft:#5a5850;
    --steel:#33495C;
    --accent:#FF5A1F;
    --line:#c7c2af;
    --font-display:'Archivo', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; font-size:16px;}
  img{max-width:100%; display:block; width:100%;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1080px; margin:0 auto; padding:0 28px;}

  /* nav */
  header{border-bottom:1px solid var(--line); background:rgba(238,236,226,.94); backdrop-filter:blur(6px); position:sticky; top:0; z-index:50;}
  nav.wrap{display:flex; align-items:center; justify-content:space-between; height:68px;}
  .logo{font-family:var(--font-mono); font-weight:600; font-size:.92rem; letter-spacing:.04em;}
  .logo span{color:var(--accent);}
  .back-link{font-family:var(--font-mono); font-size:.78rem; display:flex; align-items:center; gap:6px; color:var(--ink-soft);}
  .back-link:hover{color:var(--ink);}

  /* dim-tag */
  .dim-tag{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .dim-line{position:relative; width:32px; height:1px; background:var(--ink); flex-shrink:0;}
  .dim-line::before, .dim-line::after{content:''; position:absolute; width:1px; height:8px; background:var(--ink); top:-4px;}
  .dim-line::before{left:0;} .dim-line::after{right:0;}
  .dim-text{font-family:var(--font-mono); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--steel);}

  /* hero del proyecto */
  .proj-hero{padding:56px 0 0;}
  .proj-meta-row{display:flex; align-items:baseline; gap:20px; flex-wrap:wrap; margin-bottom:20px;}
  .proj-category{font-family:var(--font-mono); font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent);}
  .proj-year{font-family:var(--font-mono); font-size:.75rem; color:var(--ink-soft);}
  h1{font-family:var(--font-display); font-weight:900; font-size:clamp(2rem, 5vw, 3.2rem); text-transform:uppercase; letter-spacing:-.01em; line-height:1.05;}
  .proj-tagline{font-size:1.1rem; color:var(--ink-soft); margin-top:14px; max-width:620px;}

  /* imagen hero */
  .hero-img{margin-top:42px; aspect-ratio:16/7; background:var(--paper-alt); border:1px solid var(--line); overflow:hidden; display:flex; align-items:center; justify-content:center;}
  .hero-img img{object-fit:cover; height:100%; width:100%;}
  .img-ph{display:flex; align-items:center; justify-content:center; width:100%; height:100%; text-align:center;}
  .img-ph span{font-family:var(--font-mono); font-size:.78rem; color:var(--ink-soft);}

  /* cuerpo */
  .proj-body{display:grid; grid-template-columns:1fr 320px; gap:64px; padding:64px 0 80px; align-items:start;}
  .content-col{}
  .sidebar{}

  h2.sec-title{font-family:var(--font-display); font-weight:700; font-size:1.1rem; text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px; margin-top:44px;}
  h2.sec-title:first-child{margin-top:0;}
  .prose{color:var(--ink-soft); font-size:1.02rem; max-width:620px;}
  .prose p{margin-bottom:14px;}

  /* proceso tags */
  .proc-tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;}
  .proc-tag{font-family:var(--font-mono); font-size:.74rem; letter-spacing:.05em; padding:7px 14px; border:1px solid var(--ink); text-transform:uppercase; background:transparent;}

  /* galería */
  .gallery{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;}
  .gal-item{aspect-ratio:4/3; background:var(--paper-alt); border:1px dashed var(--line); overflow:hidden; display:flex; align-items:center; justify-content:center;}
  .gal-item img{object-fit:cover; width:100%; height:100%;}
  .gal-ph{font-family:var(--font-mono); font-size:.68rem; color:var(--ink-soft); text-align:center; padding:12px;}
  .gallery.full{grid-template-columns:1fr; margin-top:0;}

  /* sidebar ficha */
  .spec-card{background:var(--paper-alt); border:1px solid var(--line); padding:24px; position:sticky; top:88px;}
  .spec-head{display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--ink); padding-bottom:10px; margin-bottom:12px;}
  .spec-head .t1{font-family:var(--font-mono); font-size:.72rem; letter-spacing:.12em; text-transform:uppercase;}
  .spec-head .t2{font-family:var(--font-mono); font-size:.7rem; color:var(--ink-soft);}
  .spec-row{display:flex; flex-direction:column; gap:2px; padding:10px 0; border-bottom:1px dashed var(--line);}
  .spec-row:last-child{border-bottom:none;}
  .spec-label{font-family:var(--font-mono); font-size:.66rem; letter-spacing:.1em; text-transform:uppercase; color:var(--steel);}
  .spec-value{font-size:.9rem; font-weight:500;}

  /* CTA sidebar */
  .sidebar-cta{margin-top:20px; display:flex; flex-direction:column; gap:10px;}
  .btn{font-family:var(--font-mono); font-size:.8rem; letter-spacing:.03em; padding:13px 18px; border-radius:2px; display:flex; align-items:center; justify-content:center; gap:6px; text-align:center;}
  .btn-primary{background:var(--accent); color:var(--ink); font-weight:600;}
  .btn-primary:hover{background:var(--ink); color:var(--paper);}
  .btn-ghost{border:1px solid var(--ink); color:var(--ink);}
  .btn-ghost:hover{background:var(--ink); color:var(--paper);}

  /* nav proyectos */
  .proj-nav{border-top:1px solid var(--line); padding:32px 0; display:flex; justify-content:space-between; gap:20px;}
  .proj-nav-item{font-family:var(--font-mono); font-size:.78rem; color:var(--ink-soft); max-width:220px;}
  .proj-nav-item a{display:block; color:var(--ink); font-weight:600; margin-top:4px; font-size:.88rem;}
  .proj-nav-item a:hover{color:var(--accent);}

  /* 404 */
  .not-found{text-align:center; padding:100px 0;}
  .not-found h1{font-size:2rem;}
  .not-found p{color:var(--ink-soft); margin-top:12px;}

  /* footer */
  footer{padding:28px 0; border-top:1px solid var(--line);}
  .foot-row{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:.72rem; color:var(--ink-soft); flex-wrap:wrap; gap:8px;}

  @media(max-width:780px){
    .proj-body{grid-template-columns:1fr;}
    .sidebar{display:contents;}
    .spec-card{position:static; order:-1;}
    .sidebar-cta{flex-direction:row;}
    .gallery{grid-template-columns:1fr;}
  }
  @media(max-width:480px){
    .sidebar-cta{flex-direction:column;}
  }
</style>

  ).join('');

  const specRows = p.specs.map(s =>

    : `<div></div>`;

    ? `<div class="proj-nav-item" style="text-align:right">Siguiente →<br><a href="proyecto.html?id=${next.id}">${next.title}</a></div>`
    : `<div></div>`;

          <div class="proc-tags">${procTags}</div>

          <h2 class="sec-title">Galería</h2>
          <div class="gallery">${galleryItems}</div>
        </div>

        <div class="sidebar">
          <div class="spec-card">
            <div class="spec-head">
              <span class="t1">Ficha técnica</span>
              <span class="t2">${p.year}</span>
            </div>

          </div>
